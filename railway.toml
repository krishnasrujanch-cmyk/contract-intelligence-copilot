[build]
builder = "nixpacks"
buildCommand = "pip install -r backend/requirements.txt && cd frontend && npm install && VITE_API_URL=$RAILWAY_PUBLIC_DOMAIN npm run build"

[deploy]
startCommand = "cd backend && bash railway_start.sh"
restartPolicyType = "on_failure"
healthcheckPath = "/health"
healthcheckTimeout = 300
