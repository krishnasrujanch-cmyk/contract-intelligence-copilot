server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Security headers ───────────────────────────────────────────────────
    add_header X-Content-Type-Options    "nosniff"                           always;
    add_header X-Frame-Options           "DENY"                              always;
    add_header X-XSS-Protection          "1; mode=block"                     always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"   always;
    add_header Permissions-Policy        "geolocation=(), microphone=()"     always;
    add_header Content-Security-Policy
        "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' http://fastapi:8000;"
        always;

    # ── React SPA — serve index.html for all non-asset routes ─────────────
    location / {
        try_files $uri $uri/ /index.html;
        expires -1;  # Do not cache index.html (ensure fresh React app on deploy)
    }

    # ── Static assets — aggressive caching ────────────────────────────────
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── API proxy → FastAPI backend ────────────────────────────────────────
    # Uncomment when running frontend standalone (not via Docker Compose)
    # location /api/ {
    #     proxy_pass http://fastapi:8000;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #     proxy_set_header X-Forwarded-Proto $scheme;
    # }

    # ── Health check ───────────────────────────────────────────────────────
    location /nginx-health {
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # ── Disable server version disclosure ─────────────────────────────────
    server_tokens off;
}
